[app]
name = "Social Poster Test"
debug = true
base_url = "http://localhost"
openrouter_referer = "https://social-poster"

[database]
driver = "sqlite"
path = "../var/data/test.sqlite"

[auth]
admin_username = "admin"
admin_password = "secret"

[logging]
path = "../var/logs"
level = "info"

[security]
session_name = "social_poster_test_session"
csrf_enabled = true
encryption_key = "test-key-32-bytes-long-enough!!"

[ai]
provider = "openai"
api_key = ""
model = "gpt-4o-mini"

[facebook]
app_id = ""
app_secret = ""
page_id = ""
page_access_token = ""

[linkedin]
client_id = ""
client_secret = ""
access_token = ""
organization_id = ""
